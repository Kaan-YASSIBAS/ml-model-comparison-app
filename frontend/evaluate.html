<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluate Single Model</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <a href="index.html" class="back-link">← Back to Home</a>

            <h1>Evaluate Single Model</h1>
            <p class="subtitle">
                Select one algorithm and evaluate its performance on the spam classification dataset.
            </p>

            <div class="form-group">
                <label for="modelSelect">Select Algorithm</label>
                <select id="modelSelect">
                    <option value="logistic_regression">Logistic Regression</option>
                    <option value="knn">K-Nearest Neighbors</option>
                    <option value="decision_tree">Decision Tree</option>
                    <option value="random_forest">Random Forest</option>
                    <option value="linear_svm">Linear SVM</option>
                    <option value="naive_bayes">Naive Bayes</option>
                </select>
            </div>

            <button id="evaluateButton">Run Evaluation</button>

            <div id="loading" class="loading hidden">Training and evaluating selected model...</div>
            <div id="error" class="error hidden"></div>

            <section id="singleResult" class="result-card hidden">
                <h2>Model Result</h2>
                <p><strong>Model:</strong> <span id="modelName"></span></p>

                <div class="metrics-grid">
                    <div class="metric">
                        <span>Accuracy</span>
                        <strong id="accuracy"></strong>
                    </div>
                    <div class="metric">
                        <span>Precision</span>
                        <strong id="precision"></strong>
                    </div>
                    <div class="metric">
                        <span>Recall</span>
                        <strong id="recall"></strong>
                    </div>
                    <div class="metric">
                        <span>F1 Score</span>
                        <strong id="f1Score"></strong>
                    </div>
                </div>

                <h3>Confusion Matrix</h3>
                <table class="matrix-table">
                    <tr>
                        <th></th>
                        <th>Predicted Ham</th>
                        <th>Predicted Spam</th>
                    </tr>
                    <tr>
                        <th>Actual Ham</th>
                        <td id="cm00"></td>
                        <td id="cm01"></td>
                    </tr>
                    <tr>
                        <th>Actual Spam</th>
                        <td id="cm10"></td>
                        <td id="cm11"></td>
                    </tr>
                </table>
            </section>
        </section>
    </main>

    <script src="evaluate.js"></script>
</body>
</html>
